<div class="auth-page">
  <div class="auth-card">
    <h1>Glemt passord</h1>

    @if (message()) {
      <p>{{ message() }}</p>
      @if (resetToken()) {
        <p class="hint">
          Ingen e-posttjeneste er konfigurert ennå, så her er tilbakestillingskoden din for testing:
          <code>{{ resetToken() }}</code>
        </p>
        <a routerLink="/reset-password">Gå videre til tilbakestilling av passord</a>
      }
    } @else {
      <form (ngSubmit)="submit()">
        <label>
          E-post
          <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
        </label>
        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Sender…' : 'Send tilbakestillingslenke' }}
        </button>
      </form>
    }

    <p class="switch"><a routerLink="/login">Tilbake til innlogging</a></p>
  </div>
</div>
