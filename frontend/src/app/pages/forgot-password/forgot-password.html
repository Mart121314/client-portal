<div class="auth-page">
  <div class="auth-card">
    <h1>Forgot password</h1>

    @if (message()) {
      <p>{{ message() }}</p>
      @if (resetToken()) {
        <p class="hint">
          No email service is configured yet, so here is your reset token for testing:
          <code>{{ resetToken() }}</code>
        </p>
        <a routerLink="/reset-password">Continue to reset password</a>
      }
    } @else {
      <form (ngSubmit)="submit()">
        <label>
          Email
          <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
        </label>
        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Sending…' : 'Send reset link' }}
        </button>
      </form>
    }

    <p class="switch"><a routerLink="/login">Back to login</a></p>
  </div>
</div>
