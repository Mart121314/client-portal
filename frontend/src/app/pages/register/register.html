<div class="auth-page">
  <form class="auth-card" (ngSubmit)="submit()">
    <h1>Opprett en konto</h1>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <label>
      E-post
      <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
    </label>

    <label>
      Passord
      <input
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="8"
        autocomplete="new-password"
      />
    </label>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Oppretter konto…' : 'Registrer deg' }}
    </button>

    <p class="switch">Har du allerede en konto? <a routerLink="/login">Logg inn</a></p>
  </form>
</div>
