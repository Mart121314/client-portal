<div class="auth-page">
  <div class="auth-card">
    <h1>Tilbakestill passord</h1>

    @if (success()) {
      <p>Passord oppdatert – omdirigerer til innlogging…</p>
    } @else {
      <form (ngSubmit)="submit()">
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <label>
          Tilbakestillingskode
          <input type="text" name="token" [(ngModel)]="token" required />
        </label>

        <label>
          Nytt passord
          <input type="password" name="newPassword" [(ngModel)]="newPassword" required minlength="8" />
        </label>

        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Tilbakestiller…' : 'Tilbakestill passord' }}
        </button>
      </form>
    }

    <p class="switch"><a routerLink="/login">Tilbake til innlogging</a></p>
  </div>
</div>
