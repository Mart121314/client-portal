<div class="auth-page">
  <div class="auth-card">
    <h1>Reset password</h1>

    @if (success()) {
      <p>Password updated — redirecting to login…</p>
    } @else {
      <form (ngSubmit)="submit()">
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <label>
          Reset token
          <input type="text" name="token" [(ngModel)]="token" required />
        </label>

        <label>
          New password
          <input type="password" name="newPassword" [(ngModel)]="newPassword" required minlength="8" />
        </label>

        <button type="submit" [disabled]="loading()">
          {{ loading() ? 'Resetting…' : 'Reset password' }}
        </button>
      </form>
    }

    <p class="switch"><a routerLink="/login">Back to login</a></p>
  </div>
</div>
