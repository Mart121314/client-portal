<div class="auth-page">
  <form class="auth-card" (ngSubmit)="submit()">
    <h1>Sign in</h1>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <label>
      Email
      <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
    </label>

    <label>
      Password
      <input type="password" name="password" [(ngModel)]="password" required autocomplete="current-password" />
    </label>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>

    <p class="switch">Don't have an account? <a routerLink="/register">Register</a></p>
    <p class="switch"><a routerLink="/forgot-password">Forgot password?</a></p>
  </form>
</div>
