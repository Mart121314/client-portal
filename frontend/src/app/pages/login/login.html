<div class="auth-page">
  <form class="auth-card" (ngSubmit)="submit()">
    <h1>Logg inn</h1>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <label>
      E-post
      <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" />
    </label>

    <label>
      Passord
      <input type="password" name="password" [(ngModel)]="password" required autocomplete="current-password" />
    </label>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Logger inn…' : 'Logg inn' }}
    </button>

    <p class="switch">Har du ikke en konto? <a routerLink="/register">Registrer deg</a></p>
    <p class="switch"><a routerLink="/forgot-password">Glemt passord?</a></p>
  </form>
</div>
