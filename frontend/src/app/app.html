<div class="app-shell">
  <nav class="app-nav">
    <span class="brand">Mine Tjenester</span>
    <div class="links">
      @if (authService.currentUser(); as user) {
        @if (user.role === 'CLIENT') {
          <a routerLink="/dashboard" routerLinkActive="active">Oversikt</a>
        }
        @if (user.role === 'ADMIN') {
          <a routerLink="/admin" routerLinkActive="active">Admin</a>
          <a class="nav-messages" routerLink="/messages" routerLinkActive="active">
            <svg
              class="tab-icon"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
              />
            </svg>
            Meldinger
            @if (unreadCount() > 0) {
              <span class="badge badge-rejected">{{ unreadCount() }}</span>
            }
          </a>
          <a routerLink="/users" routerLinkActive="active">Brukere</a>
        }
        <span class="switch">{{ user.email }}</span>
        <button class="secondary" (click)="logout()">Logg ut</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Logg inn</a>
        <a routerLink="/register" routerLinkActive="active">Registrer deg</a>
      }
    </div>
  </nav>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
