<div class="app-shell">
  <nav class="app-nav">
    <span class="brand">Mine Tjenester</span>
    <div class="links">
      @if (authService.currentUser(); as user) {
        @if (user.role === 'CLIENT') {
          <a routerLink="/dashboard" routerLinkActive="active">Oversikt</a>
        }
        @if (user.role === 'ADMIN') {
          <a routerLink="/admin" routerLinkActive="active">Admin</a>
          <a routerLink="/invoices" routerLinkActive="active">Faktura</a>
          <app-messages-popover />
          <a routerLink="/users" routerLinkActive="active">Brukere</a>
        }
        <span class="switch">{{ user.email }}</span>
        <button class="secondary" (click)="logout()">Logg ut</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Logg inn</a>
        <a routerLink="/register" routerLinkActive="active">Registrer deg</a>
      }
      <button
        type="button"
        class="theme-toggle"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Bytt til lyst tema' : 'Bytt til mørkt tema'"
      >
        @if (themeService.theme() === 'dark') {
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        }
      </button>
    </div>
  </nav>

  <main class="app-main">
    <router-outlet />
  </main>
</div>
